name: Build sub-injector

on:
  push:
    tags:
      - 'sub-injector-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Run tests
        working-directory: sub-injector
        run: cargo test

      - name: Build release binary
        working-directory: sub-injector
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Prepare artifact
        run: |
          cp sub-injector/target/x86_64-unknown-linux-musl/release/sub-injector \
             sub-injector-x86_64-linux
          chmod +x sub-injector-x86_64-linux

      - name: Get tag name
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "name=sub-injector-latest" >> $GITHUB_OUTPUT
          fi

      - name: Delete old latest release
        if: steps.tag.outputs.name == 'sub-injector-latest'
        run: |
          gh release delete sub-injector-latest --yes 2>/dev/null || true
          git push origin :refs/tags/sub-injector-latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: sub-injector ${{ steps.tag.outputs.name }}
          body: |
            Remnawave Subscription Injector с поддержкой `{token}` шаблона.

            Персональный `hy2://` URI для каждого пользователя через `hy-webhook`.

            **Установка через hy-sub-install.sh** — автоматическая.

            **Вручную:**
            ```bash
            curl -fsSL https://github.com/stump3/server-manager/releases/latest/download/sub-injector-x86_64-linux \
                -o /usr/local/bin/sub-injector && chmod +x /usr/local/bin/sub-injector
            ```

            **config.toml:**
            ```toml
            upstream_url = "http://127.0.0.1:3010"
            bind_addr = "0.0.0.0:3020"

            [[injections]]
            header = "User-Agent"
            contains = ["hiddify", "happ", "nekobox", "nekoray", "v2rayng"]
            per_user_url = "http://127.0.0.1:8766/uri"
            ```
          files: sub-injector-x86_64-linux
          prerelease: ${{ steps.tag.outputs.name == 'sub-injector-latest' }}
